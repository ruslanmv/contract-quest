name: Deploy to GitHub Pages
on:
  push: { branches: ["main"] }
  workflow_dispatch:
permissions: { contents: read, pages: write, id-token: write }
concurrency: { group: pages, cancel-in-progress: true }
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: "${{ steps.deploy.outputs.page_url }}" }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "lts/*", cache: "npm" }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
        env:
          VITE_BASE: /contract-quest/
      - id: pages
        name: Check whether GitHub Pages is enabled
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          status=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages")
          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled for ${REPOSITORY}; skipping Pages deploy."
            echo "Enable Settings > Pages > Build and deployment > Source: GitHub Actions to deploy from this workflow."
          fi
      - if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v6
      - if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v4
        with: { path: ./dist }
      - if: steps.pages.outputs.enabled == 'true'
        id: deploy
        uses: actions/deploy-pages@v5
